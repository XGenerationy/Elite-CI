  - id: format-go
    script: ci/checks/format.sh
    description: "Go formatting check with gofmt"
    languages: [go]
    requires_tool: gofmt
    severity: blocker
    phase: format
    pre_commit: true
    timeout_sec: 30

  - id: typecheck-js
    script: ci/checks/typecheck.sh
    description: "TypeScript type checking with tsc"
    languages: [javascript]
    requires_tool: tsc
    severity: blocker
    phase: typecheck
    pre_commit: false
    timeout_sec: 120

  - id: typecheck-python
    script: ci/checks/typecheck.sh
    description: "Python type checking with mypy/pyright"
    languages: [python]
    requires_tool: mypy
    severity: warning
    phase: typecheck
    pre_commit: false
