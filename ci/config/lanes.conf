# id|name|command|blocking|description
git-safety|Git safety|./ci/checks/git-safety.sh|yes|Validates branch state, whitespace, conflict markers, and staged dangerous content.
changed-files|Changed files|./ci/checks/changed-files.sh|yes|Records changed, staged, and untracked file lists for auditability.
node|Node checks|./ci/checks/node.sh|yes|Runs lockfile-constrained Node install plus available format, lint, typecheck, test, and build scripts.
python|Python checks|./ci/checks/python.sh|yes|Runs Python dependency verification, Ruff, pytest, and compile smoke checks when configured.
security|Security checks|./ci/checks/security.sh|yes|Scans changed and staged files for secret-like content and runs available dependency audits.
build|Build and script validation|./ci/checks/build.sh|yes|Validates shell syntax and optional shellcheck coverage for CI scripts.
debt|Known debt ratchet|./ci/checks/debt.sh|yes|Checks registered known debt has not expired, changed signature, or increased.
